<!DOCTYPE html>
<html lang="ur">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mera AI Chatbot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f0f0f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .chat-container { background: white; width: 500px; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .chat-header { background: #5c47d6; color: white; padding: 16px 20px; font-size: 18px; font-weight: bold; }
    .chat-box { height: 400px; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .msg { padding: 10px 14px; border-radius: 10px; max-width: 80%; line-height: 1.5; font-size: 14px; }
    .user-msg { background: #5c47d6; color: white; align-self: flex-end; }
    .ai-msg { background: #f0f0f0; color: #333; align-self: flex-start; }
    .loading { color: #999; font-style: italic; }
    .input-area { padding: 12px; border-top: 1px solid #eee; display: flex; gap: 8px; }
    input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
    input:focus { border-color: #5c47d6; }
    button { padding: 10px 18px; background: #5c47d6; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
    button:hover { background: #4535b0; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    body.dark-mode { background: #121212; }
    body.dark-mode .chat-container { background: #1e1e1e; }
    body.dark-mode .ai-msg { background: #2a2a2a; color: #eee; }
    body.dark-mode .chat-box { background: #1e1e1e; }
    body.dark-mode input { background: #2a2a2a; color: white; border-color: #444; }
    .theme-btn { position: absolute; top: 12px; right: 16px; background: none; border: none; font-size: 20px; cursor: pointer; }
    .typing-dots span {
    display: inline-block;
    width: 6px;
    height: 6px;
    margin: 0 2px;
    background: #999;
    border-radius: 50%;
    animation: blink 1.4s infinite both;
    }
    .msg-wrapper { position: relative; display: flex; align-items: flex-end; gap: 6px; }
    .copy-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 14px;
    opacity: 0.5;
    padding: 2px;
    }
    .copy-btn:hover { opacity: 1; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
    0%, 80%, 100% { opacity: 0; }
    40% { opacity: 1; }
    }
    .image-preview { max-width: 150px; border-radius: 8px; margin-top: 6px; }
  </style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">🤖 Mera AI Chatbot
  <button class="theme-btn" onclick="toggleTheme()">🌙</button>
</div>
  <div class="chat-box" id="chat-box">
    <div class="msg ai-msg">Assalamo Alikum! Main tumhara AI Assistant hoon. Kuch bhi pucho! 😊</div>
  </div>
  <div class="input-area">
    <input type="file" id="image-input" accept="image/*" style="display:none" onchange="handleImageUpload(event)" />
<button onclick="document.getElementById('image-input').click()">🖼️</button>
    <input type="text" id="user-input" placeholder="Kuch likho..." onkeydown="if(event.key === 'Enter') sendMessage()" />
    <button id="send-btn" onclick="sendMessage()">Bhejo</button>
    <button id="mic-btn" onclick="startVoice()">🎤 Bolo</button>
    <button id="voice-toggle-btn" onclick="voiceOutputOn = !voiceOutputOn; this.textContent = voiceOutputOn ? '🔊 On' : '🔇 Off'">🔇 Off</button>
  </div>
</div>
      
<script>

let conversationHistory = JSON.parse(localStorage.getItem("chatHistory")) || [];

function saveHistory() {
  localStorage.setItem("chatHistory", JSON.stringify(conversationHistory));
}

let chatId = localStorage.getItem("chatId");
if (!chatId) {
  chatId = crypto.randomUUID();
  localStorage.setItem("chatId", chatId);
}

function loadOldMessages() {
  const chatBox = document.getElementById("chat-box");
  conversationHistory.forEach(msg => {
    const div = document.createElement("div");
    div.className = `msg ${msg.role === "user" ? "user-msg" : "ai-msg"}`;
    div.textContent = msg.content;
    chatBox.appendChild(div);
  });
  chatBox.scrollTop = chatBox.scrollHeight;
}

loadOldMessages();
function toggleTheme() {
  document.body.classList.toggle("dark-mode");
  localStorage.setItem("theme", document.body.classList.contains("dark-mode") ? "dark" : "light");
}

if (localStorage.getItem("theme") === "dark") {
  document.body.classList.add("dark-mode");
}
function formatText(text) {
  let formatted = text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");

  formatted = formatted.replace(/\*\*(.+?)\*\*/g, "<b>$1</b>");
  formatted = formatted.replace(/^- (.+)$/gm, "• $1");
  formatted = formatted.replace(/\n/g, "<br>");

  return formatted;
}

  function addMessage(text, sender) {
  const chatBox = document.getElementById("chat-box");

  const wrapper = document.createElement("div");
  wrapper.className = "msg-wrapper";

  const div = document.createElement("div");
  div.className = `msg ${sender === "user" ? "user-msg" : "ai-msg"}`;
  div.innerHTML = formatText(text);

  wrapper.appendChild(div);

  if (sender === "ai") {
    const copyBtn = document.createElement("button");
    copyBtn.className = "copy-btn";
    copyBtn.textContent = "📋";
   copyBtn.onclick = () => {
  const tempInput = document.createElement("textarea");
  tempInput.value = div.textContent;
  document.body.appendChild(tempInput);
  tempInput.select();
  document.execCommand("copy");
  document.body.removeChild(tempInput);
  copyBtn.textContent = "✅";
  setTimeout(() => { copyBtn.textContent = "📋"; }, 1500);
};
    wrapper.appendChild(copyBtn);
  }

  chatBox.appendChild(wrapper);
  chatBox.scrollTop = chatBox.scrollHeight;
  return div;
}
let pendingImage = null;
let voiceOutputOn = false;

function handleImageUpload(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    pendingImage = e.target.result;

    const chatBox = document.getElementById("chat-box");
    const wrapper = document.createElement("div");
    wrapper.className = "msg-wrapper";
    const div = document.createElement("div");
    div.className = "msg user-msg";
    div.innerHTML = `<img src="${pendingImage}" class="image-preview" /><br>Tasveer taiyar hai, ab neeche sawal likho ya seedha "Bhejo" dabao`;
    wrapper.appendChild(div);
    chatBox.appendChild(wrapper);
    chatBox.scrollTop = chatBox.scrollHeight;
  };
  reader.readAsDataURL(file);
}
async function sendMessage() {
  const input = document.getElementById("user-input");
  const btn = document.getElementById("send-btn");
  const userText = input.value.trim();
  if (!userText && !pendingImage) return;

  input.value = "";
  btn.disabled = true;

  if (!pendingImage) {
    addMessage(userText, "user");
    conversationHistory.push({ role: "user", content: userText });
    saveHistory();
  }

  const loadingDiv = addMessage("", "ai");
  loadingDiv.innerHTML = '<span class="typing-dots"><span></span><span></span><span></span></span>';
  loadingDiv.classList.add("loading");

 try {
    const response = await fetch("https://ai-chatbot-production-19c7.up.railway.app/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        message: userText,
        history: conversationHistory,
        image: pendingImage,
        voice: voiceOutputOn,
        chat_id: chatId,
        user_id: chatId
      })
    });

    loadingDiv.classList.remove("loading");
    loadingDiv.textContent = "";

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    const chatBox = document.getElementById("chat-box");
    let buffer = "";
    let fullReply = "";
    let audioBase64 = null;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const parts = buffer.split("\n\n");
      buffer = parts.pop();

      for (const part of parts) {
        if (!part.startsWith("data: ")) continue;
        const evt = JSON.parse(part.slice(6));

        if (evt.type === "chunk") {
          fullReply += evt.content;
          loadingDiv.textContent = fullReply;
          chatBox.scrollTop = chatBox.scrollHeight;
        } else if (evt.type === "audio") {
          audioBase64 = evt.content;
        } else if (evt.type === "done") {
          loadingDiv.innerHTML = formatText(fullReply);
        }
      }
    }

    conversationHistory.push({ role: "assistant", content: fullReply });
    saveHistory();

    if (audioBase64) {
      const audio = new Audio("data:audio/wav;base64," + audioBase64);
      audio.playbackRate = 1.3;
      audio.play();
    }

  } catch (error) {
    loadingDiv.classList.remove("loading");
    loadingDiv.textContent = "Kuch masla ho gaya. Dobara try karo.";
    console.error(error);
  }
  

  pendingImage = null;
  btn.disabled = false;
  input.focus();
}

  function startVoice() {
  const recog = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recog.lang = 'ur-PK';
  recog.start();

  document.getElementById('mic-btn').textContent = '🔴 Sun raha hoon...';

  recog.onresult = function(e) {
    const text = e.results[0][0].transcript;
    document.getElementById('user-input').value = text;
    document.getElementById('mic-btn').textContent = '🎤 Bolo';
    sendMessage();
  };

  recog.onerror = function(e) {
  document.getElementById('mic-btn').textContent = '🎤 Bolo';
  if (e.error === 'no-speech') {
    alert('Kuch suna nahi. Dobara try karein.');
  } else {
    alert('Mic mein masla ho gaya: ' + e.error);
    }
  }
}

</script>
</body>
</html>
