<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #111; color: #eee; }

  .login-box {
    max-width: 340px; margin: 100px auto; background: #1e1e1e;
    padding: 30px; border-radius: 10px; text-align: center;
  }
  .login-box input {
    width: 100%; padding: 10px; margin: 12px 0; border-radius: 6px;
    border: none; font-size: 14px;
  }
  .login-box button {
    width: 100%; padding: 10px; border: none; border-radius: 6px;
    background: #4facfe; color: white; font-size: 14px; cursor: pointer;
  }

  .dashboard { display: none; max-width: 900px; margin: 30px auto; padding: 0 15px; }
  .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .chat-list { display: flex; flex-direction: column; gap: 10px; }
  .chat-item {
    background: #1e1e1e; padding: 14px; border-radius: 8px; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
  }
  .chat-item:hover { background: #2a2a2a; }
  .chat-item .title { font-weight: bold; }
  .chat-item .meta { font-size: 12px; color: #999; }

  .overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7); justify-content: center; align-items: center;
  }
  .chat-view {
    background: #1e1e1e; width: 90%; max-width: 600px; max-height: 80vh;
    overflow-y: auto; border-radius: 10px; padding: 20px;
  }
  .msg { padding: 10px 14px; border-radius: 10px; margin-bottom: 10px; max-width: 80%; }
  .msg.user { background: #4facfe; color: white; margin-left: auto; }
  .msg.assistant { background: #333; color: #eee; }
  .close-btn { float: right; cursor: pointer; background: #444; border: none; color: white; padding: 6px 12px; border-radius: 6px; }
</style>
</head>
<body>

  <div class="login-box" id="login-box">
    <h2>🔒 Admin Login</h2>
    <input type="password" id="password-input" placeholder="Password daalein">
    <button onclick="login()">Dakhil Ho</button>
    <p id="login-error" style="color:#ff6b6b; margin-top:10px; font-size:13px;"></p>
  </div>

  <div class="dashboard" id="dashboard">
    <div class="dash-header">
      <h2>📊 Chat Dashboard</h2>
      <span id="total-count"></span>
    </div>
    <div class="chat-list" id="chat-list"></div>
  </div>

  <div class="overlay" id="overlay">
    <div class="chat-view">
      <button class="close-btn" onclick="closeChat()">Band Karein</button>
      <div id="chat-messages" style="margin-top: 20px;"></div>
    </div>
  </div>

<script>
  const API_BASE = "https://ai-chatbot-production-19c7.up.railway.app";
  let adminPassword = "";

  function login() {
    const pwd = document.getElementById("password-input").value;
    adminPassword = pwd;
    loadChats();
  }

  async function loadChats() {
    try {
      const res = await fetch(`${API_BASE}/admin/chats`, {
        headers: { "X-Admin-Password": adminPassword }
      });

      if (res.status === 401) {
        document.getElementById("login-error").textContent = "Ghalat password, dobara koshish karein.";
        return;
      }

      const data = await res.json();
      document.getElementById("login-box").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
      document.getElementById("total-count").textContent = data.chats.length + " chats";

      const list = document.getElementById("chat-list");
      list.innerHTML = "";

      data.chats.forEach(chat => {
        const div = document.createElement("div");
        div.className = "chat-item";
        div.onclick = () => openChat(chat.id);
        div.innerHTML = `
          <div>
            <div class="title">${chat.title || "New Chat"}</div>
            <div class="meta">${chat.user_id} • ${new Date(chat.created_at).toLocaleString()}</div>
          </div>
          <div class="meta">${chat.message_count} messages</div>
        `;
        list.appendChild(div);
      });

    } catch (err) {
      document.getElementById("login-error").textContent = "Kuch masla ho gaya, dobara koshish karein.";
      console.error(err);
    }
  }

  async function openChat(chatId) {
    const res = await fetch(`${API_BASE}/admin/chat/${chatId}`, {
      headers: { "X-Admin-Password": adminPassword }
    });
    const data = await res.json();

    const container = document.getElementById("chat-messages");
    container.innerHTML = "";

    data.messages.forEach(msg => {
      const div = document.createElement("div");
      div.className = "msg " + (msg.role === "user" ? "user" : "assistant");
      div.textContent = msg.content;
      container.appendChild(div);
    });

    document.getElementById("overlay").style.display = "flex";
  }

  function closeChat() {
    document.getElementById("overlay").style.display = "none";
  }
</script>
</body>
</html>
